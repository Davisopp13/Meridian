<!DOCTYPE html>
<html>
<head><title>Meridian Relay</title></head>
<body>
<script>
  // Meridian Relay
  // This page runs on meridian-hlag.com and does two things:
  //
  // 1. TRIGGER CODE LOADER — When loaded with ?load=trigger, fetches
  //    meridian-trigger.js and sends the code back to the parent window
  //    (the SF page) so it can run via new Function().
  //
  // 2. SUPABASE PROXY — Listens for postMessage from the trigger code
  //    and proxies Supabase REST calls using the anon key. This is needed
  //    because Salesforce CSP blocks direct fetch() to external domains.
  //
  // Auth model: The bookmarklet has the user's UUID baked in (set during
  // onboarding). The anon key is used for all Supabase calls. RLS on
  // pending_triggers ensures only valid user_ids can insert rows.
  //
  // NOTE: We use Prefer: return=minimal (not return=representation) because
  // the anon role can INSERT but cannot SELECT on pending_triggers.
  // PostgREST would try to read back the inserted row with return=representation,
  // which fails the SELECT RLS policy (requires auth.uid()).

  const SUPABASE_URL = 'https://wluynppocsoqjdbmwass.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsdXlucHBvY3NvcWpkYm13YXNzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NDU4NzIsImV4cCI6MjA4ODIyMTg3Mn0.x9-t_038hz4eJUciA1F9-DWE8UN_V58KE0i43cpOAMk';

  // ── Trigger code loader ────────────────────────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  if (params.get('load') === 'trigger') {
    fetch('/meridian-trigger.js?v=' + Date.now())
      .then(function(resp) {
        if (!resp.ok) throw new Error('Failed to fetch trigger: ' + resp.status);
        return resp.text();
      })
      .then(function(code) {
        window.parent.postMessage({ meridianTriggerCode: code }, '*');
      })
      .catch(function(err) {
        window.parent.postMessage({ meridianTriggerError: err.message }, '*');
      });
  }

  // ── Message relay ──────────────────────────────────────────────────────────
  window.addEventListener('message', async function(event) {
    if (!event.data || event.data.relay !== 'MERIDIAN_TRIGGER') return;

    const { id, action, payload } = event.data;

    try {
      let result;

      if (action === 'SUPABASE_INSERT_TRIGGER') {
        const resp = await fetch(SUPABASE_URL + '/rest/v1/pending_triggers', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload.body)
        });

        if (!resp.ok) {
          var errText = await resp.text();
          throw new Error(resp.status + ': ' + errText);
        }
        // return=minimal gives 201 with empty body
        result = { success: true };
      }

      else if (action === 'SUPABASE_POST') {
        const resp = await fetch(SUPABASE_URL + '/rest/v1/' + payload.table, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload.body)
        });

        if (!resp.ok) {
          var errText = await resp.text();
          throw new Error(resp.status + ': ' + errText);
        }
        result = { success: true };
      }

      else if (action === 'SUPABASE_GET') {
        const token = payload.token || SUPABASE_ANON_KEY;
        const resp = await fetch(SUPABASE_URL + '/rest/v1/' + payload.table + '?' + payload.query, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': 'Bearer ' + token
          }
        });

        if (!resp.ok) {
          var errText = await resp.text();
          throw new Error(resp.status + ': ' + errText);
        }
        result = await resp.json();
      }

      else {
        throw new Error('Unknown action: ' + action);
      }

      event.source.postMessage({
        relay: 'MERIDIAN_TRIGGER_RESPONSE',
        id: id,
        success: true,
        data: result
      }, '*');

    } catch (err) {
      event.source.postMessage({
        relay: 'MERIDIAN_TRIGGER_RESPONSE',
        id: id,
        success: false,
        error: err.message
      }, '*');
    }
  });

  // Signal that relay is ready
  if (window.parent !== window) {
    window.parent.postMessage({ relay: 'MERIDIAN_RELAY_READY' }, '*');
  }
</script>
</body>
</html>
