<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<script>
  const MERIDIAN_HOST = window.location.origin;
  const MERIDIAN_MSG_TYPES = [
    'MERIDIAN_CASE_START',
    'MERIDIAN_PROCESS_START',
  ];

  if (window.parent !== window) {
    window.parent.postMessage({ type: 'MERIDIAN_RELAY_READY' }, '*');
  }

  window.addEventListener('message', function (e) {
    if (!e.data || !e.data.type) return;
    if (!MERIDIAN_MSG_TYPES.includes(e.data.type)) return;
    const target = window.opener || window.top;
    if (target && target !== window) {
      target.postMessage(e.data, MERIDIAN_HOST);
    }
  });
</script>
</body>
</html>
